<!-- src/app/layout/main-layout/main-layout.component.html -->
<div class="app-shell" [class.sidebar-collapsed]="collapsed()">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">TaskFlow CBA</span>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()" title="Colapsar menú">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span class="nav-label">Dashboard</span>
      </a>

      <div class="nav-section-label">Gestión</div>
      <a routerLink="/proyectos" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7l9-4 9 4v10l-9 4-9-4z"/>
          <path d="M12 3v18M3 7l9 4 9-4"/>
        </svg>
        <span class="nav-label">Proyectos</span>
      </a>

      <a routerLink="/tareas" routerLinkActive="active" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
        <span class="nav-label">Mis Tareas</span>
      </a>

      @if (authService.isAdmin()) {
        <div class="nav-section-label">Administración</div>
        <a routerLink="/usuarios" routerLinkActive="active" class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
          </svg>
          <span class="nav-label">Usuarios</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <a routerLink="/perfil" routerLinkActive="active" class="user-profile">
        <div class="avatar avatar-sm">
          {{ getInitials(authService.usuario()?.nombre || '') }}
        </div>
        <div class="user-info">
          <span class="user-name">{{ authService.usuario()?.nombre }}</span>
          <span class="user-role badge" [ngClass]="'badge-' + (authService.usuario()?.rol || 'miembro')">
            {{ authService.usuario()?.rol }}
          </span>
        </div>
      </a>
      <button class="logout-btn" (click)="logout()" title="Cerrar sesión">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <!-- TOP NAVBAR -->
    <header class="topbar">
      <button class="mobile-toggle" (click)="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="topbar-spacer"></div>
      <div class="topbar-actions">
        <a routerLink="/tareas/nueva" class="btn btn-primary btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Nueva Tarea
        </a>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <div class="page-content">
      <router-outlet />
    </div>
  </main>
</div>
